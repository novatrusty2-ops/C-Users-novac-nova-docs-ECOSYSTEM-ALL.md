name: Build Nova Wallet (legacy)

# Prefer deploy-production.yml — kept for manual Nova-only artifact builds
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - working-directory: apps/nova
        env:
          VITE_BASE: /nova/
        run: |
          npm run typecheck
          npm run test
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: nova-wallet-dist
          path: apps/nova/dist
