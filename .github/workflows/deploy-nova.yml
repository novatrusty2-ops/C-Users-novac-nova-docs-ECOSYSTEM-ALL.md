name: Deploy Nova Wallet

# Nova owns novablockchain.it.com apex — use deploy-production.yml for the full split site.
# This workflow builds a Nova-only artifact for mirrors / VPS (apps/nova/deploy.sh).
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - working-directory: apps/nova
        env:
          VITE_BASE: /
        run: |
          npm run typecheck
          npm run test
          npm run build
          cp dist/index.html dist/404.html
      - uses: actions/upload-artifact@v4
        with:
          name: nova-wallet-dist
          path: apps/nova/dist
