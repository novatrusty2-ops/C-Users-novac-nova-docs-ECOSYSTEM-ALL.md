name: Deploy Nova Wallet

# Nova Wallet ONLY — owns https://novablockchain.it.com/
# Signet is a separate product (signetwallet.com) and is NOT deployed here.
on:
  push:
    branches: [main]
    paths:
      - 'apps/nova/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-nova.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-nova
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Test & build Nova
        working-directory: apps/nova
        env:
          VITE_BASE: /
        run: |
          npm run typecheck
          npm run test
          npm run build

      - name: Assemble Nova-only site
        run: |
          rm -rf site
          mkdir -p site/signet
          cp -a apps/nova/dist/. site/
          cp site/index.html site/404.html
          touch site/.nojekyll
          echo 'novablockchain.it.com' > site/CNAME
          # Signet is NOT hosted here — point old /signet/ bookmarks at canonical domain
          cat > site/signet/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta http-equiv="refresh" content="0;url=https://signetwallet.com/" />
            <link rel="canonical" href="https://signetwallet.com/" />
            <title>Signet Wallet — separate product</title>
            <style>
              body { margin:0; min-height:100vh; display:grid; place-items:center;
                     background:#1A0A0A; color:#F5E6C8; font-family:system-ui,sans-serif; text-align:center; }
              a { color:#C9A84C; }
            </style>
          </head>
          <body>
            <p>
              <strong>Signet Wallet</strong> is a separate product from Nova Wallet.<br />
              <a href="https://signetwallet.com/">Continue to signetwallet.com →</a>
            </p>
          </body>
          </html>
          EOF
          cat > site/wallets.json <<'EOF'
          {
            "nova": {
              "url": "https://novablockchain.it.com/",
              "name": "Nova Wallet",
              "host": "novablockchain.it.com"
            },
            "signet": {
              "url": "https://signetwallet.com/",
              "name": "Signet Wallet",
              "note": "Separate product — not hosted on Nova Pages"
            },
            "split": true
          }
          EOF
          grep -q 'Nova Wallet' site/index.html
          test ! -d site/signet/assets

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
