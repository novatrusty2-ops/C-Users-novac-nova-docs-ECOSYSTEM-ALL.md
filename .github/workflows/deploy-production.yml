name: Deploy Nova Wallet (manual)

# Nova alone — same as deploy-nova.yml (manual trigger)
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-nova
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - working-directory: apps/nova
        env:
          VITE_BASE: /
        run: |
          npm run typecheck
          npm run test
          npm run build
      - name: Assemble Nova site
        run: |
          rm -rf site
          mkdir -p site
          cp -a apps/nova/dist/. site/
          cp site/index.html site/404.html
          touch site/.nojekyll
          echo 'novablockchain.it.com' > site/CNAME
          test ! -e site/signet
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
