name: Deploy Signet Wallet

on:
  push:
    branches: [main]
    paths:
      - 'apps/signet/**'
      - '.github/workflows/deploy-signet.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-signet
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/signet
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/signet/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: SPA fallback + CNAME
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
          echo 'novablockchain.it.com' > dist/CNAME
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/signet/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
