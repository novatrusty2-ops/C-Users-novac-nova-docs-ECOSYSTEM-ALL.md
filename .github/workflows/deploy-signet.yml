name: Deploy Signet Wallet (legacy)

# Prefer deploy-production.yml — kept for manual Signet-only rebuilds
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-signet
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - working-directory: apps/signet
        run: |
          npm run typecheck
          npm run test
          npm run build
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
          echo 'novablockchain.it.com' > dist/CNAME
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/signet/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
