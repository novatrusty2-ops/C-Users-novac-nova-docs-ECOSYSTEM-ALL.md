name: Build Signet Wallet (archived path)

# Signet is not part of the Nova Wallet product/host.
# Manual artifact build only — does not publish to novablockchain.it.com.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - working-directory: apps/signet
        env:
          VITE_BASE: /
        run: |
          npm run typecheck
          npm run test
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: signet-wallet-dist
          path: apps/signet/dist
