name: Deploy Signet Wallet

# Signet Pages mirror is assembled at /signet/ by deploy-production.yml.
# Canonical: https://signetwallet.com (Anakatech VPS via apps/signet/deploy.sh).
# This workflow builds a Signet-only artifact (root base) for the VPS mirror.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - working-directory: apps/signet
        env:
          VITE_BASE: /
        run: |
          npm run typecheck
          npm run test
          npm run build
          cp dist/index.html dist/404.html
      - uses: actions/upload-artifact@v4
        with:
          name: signet-wallet-dist
          path: apps/signet/dist
